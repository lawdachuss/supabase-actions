# =============================================================================
# 🚀 Full Supabase Self-Hosted on GitHub Actions
# =============================================================================
# What this does:
# 1. Starts ALL Supabase services (full stack with Storage, Realtime, etc.)
# 2. Restores your database from GitHub Actions cache (so data persists)
# 3. Exposes everything via Cloudflare Tunnel
# 4. Runs for ~5h45m per session (maximizing the full 6-hour GitHub Actions limit)
# 5. Scheduled every 6 hours — 20 min gap between runs for clean handoff
#
# Required GitHub Secrets:
#   CF_TUNNEL_TOKEN     - Cloudflare Tunnel token (from cloudflared tunnel token generate)
#   CF_TUNNEL_DOMAIN    - Your domain for public access (e.g. supabase.chuglii.in)
#   POSTGRES_PASSWORD   - Your secure PostgreSQL password
#   JWT_SECRET          - JWT signing secret (32+ chars)
#   DASHBOARD_PASSWORD  - Supabase Studio admin password
# =============================================================================

name: 🚀 Full Supabase Self-Hosted

on:
  workflow_dispatch:                     # Manual trigger - click "Run workflow" in GitHub UI
  schedule:
    - cron: '0 */6 * * *'               # Every 6 hours — 15min gap between runs

  # NOTE: 'push' trigger removed because every git push cancels the running 5h45m session
  # (concurrency.cancel-in-progress kills the old run when a new one starts).
  # Use workflow_dispatch to test workflow changes instead.

concurrency:
  group: supabase-host
  cancel-in-progress: true               # Cancel old run when new one starts (clean handoff)

env:
  SUPABASE_DIR: ./supabase
  BACKUP_FILE: ./supabase/backup.dump
  COMPOSE_FILE: docker-compose.yml:docker-compose.logs.yml
  DOCKER_SOCKET_LOCATION: /var/run/docker.sock

jobs:
  supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 355                  # 5h55m — 5 min buffer under 360 min hard limit

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # ── Restore caches ────────────────────────────────────────────────
      # NOTE: No compose YAML changes below this line — that would change
      # hashFiles() cache key, causing Docker image cache to miss every run.
      - name: 🐳 Restore Docker image cache
        id: cache-docker
        uses: actions/cache/restore@v4
        with:
          path: /tmp/docker-images.tar
          key: docker-images-${{ hashFiles('supabase/docker-compose.yml', 'supabase/docker-compose.logs.yml') }}

      # DB backup cache (separate key with fallback for cross-run persistence)
      - name: 💾 Restore database cache
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.BACKUP_FILE }}
          key: supabase-db-${{ github.run_id }}
          restore-keys: |
            supabase-db-
          fail-on-cache-miss: false

      # ── Parallel prep + startup (everything runs at once) ──────────────
      - name: 🚀 Super-fast startup
        run: |
          cd ${{ env.SUPABASE_DIR }}
          
          # ══════════════════════════════════════════════════════════════
          # PHASE 1: Prepare dependencies (parallel background jobs)
          # ══════════════════════════════════════════════════════════════
          (
            # Download cloudflared
            curl -sL --retry 3 https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
              -o /usr/local/bin/cloudflared &&
            chmod +x /usr/local/bin/cloudflared &&
            cloudflared version
          ) &
          pip install 'ecdsa>=0.19.0' -q &
          mkdir -p volumes/{db/data,functions,pooler,snippets,api,logs} &
          
          # Start docker compose pull early (runs in parallel with setup)
          if [ ! -f /tmp/docker-images.tar ]; then
            echo "⏳ Cache file not found — pulling Docker images in background..."
            docker compose pull 2>&1 | tail -3 &
          else
            echo "✅ Cache file exists — pull skipped, will load from cache"
          fi
          wait
          
          # ══════════════════════════════════════════════════════════════
          # PHASE 2: Configure .env (fast — ~3s)
          # ══════════════════════════════════════════════════════════════
          cp .env.example .env
          if [ -n "${{ secrets.CF_TUNNEL_DOMAIN }}" ]; then
            export PUBLIC_URL="https://${{ secrets.CF_TUNNEL_DOMAIN }}"
          else
            export PUBLIC_URL="http://localhost:8000"
          fi
          python3 << 'PYEOF'
          import os, hmac, hashlib, base64, json, uuid
          from ecdsa import SigningKey, NIST256p
          from ecdsa.util import sigencode_string

          secret = os.environ['JWT_SECRET']
          public_url = os.environ['PUBLIC_URL']

          def derive_hex(name, num_bytes):
              return hmac.new(secret.encode(), name.encode(), hashlib.sha512).hexdigest()[:num_bytes * 2]
          def derive_b64(name, length):
              return base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), name.encode(), hashlib.sha512).digest()).decode()[:length]
          def b64url(d):
              return base64.urlsafe_b64encode(d).rstrip(b'=').decode()
          def sign_hs256(payload_dict, secret):
              header = json.dumps({"alg": "HS256", "typ": "JWT"}).encode()
              payload = json.dumps(payload_dict).encode()
              b64_h = b64url(header)
              b64_p = b64url(payload)
              sig = hmac.new(secret.encode(), f"{b64_h}.{b64_p}".encode(), hashlib.sha256).digest()
              return f"{b64_h}.{b64_p}.{b64url(sig)}"
          def sign_es256(payload_dict, sk, kid):
              header = json.dumps({"alg": "ES256", "typ": "JWT", "kid": kid}).encode()
              payload = json.dumps(payload_dict).encode()
              b64_h = b64url(header)
              b64_p = b64url(payload)
              sig = sk.sign(f"{b64_h}.{b64_p}".encode(), hashfunc=hashlib.sha256, sigencode=sigencode_string)
              return f"{b64_h}.{b64_p}.{b64url(sig)}"

          iat = 1700000000
          exp = iat + 315360000
          anon_key = sign_hs256({'role': 'anon', 'iss': 'supabase', 'iat': iat, 'exp': exp}, secret)
          service_key = sign_hs256({'role': 'service_role', 'iss': 'supabase', 'iat': iat, 'exp': exp}, secret)

          skb = derive_b64('secret_key_base', 64)
          rek = derive_hex('realtime_enc_key', 8)
          vek = derive_hex('vault_enc_key', 16)
          pmk = derive_b64('pg_meta_crypto_key', 32)
          ptid = derive_hex('pooler_tenant_id', 8)
          # s3 keys no longer needed — storage service removed
          lfp = derive_b64('logflare_public', 32)
          lpv = derive_b64('logflare_private', 32)

          # Generate ES256 P-256 key pair deterministically from JWT_SECRET
          ec_seed = hmac.new(secret.encode(), b'asymmetric_es256', hashlib.sha512).digest()[:32]
          sk_ec = SigningKey.from_string(ec_seed, curve=NIST256p)
          vk = sk_ec.verifying_key
          pub_point = vk.pubkey.point
          jwk_x = b64url(pub_point.x().to_bytes(32, 'big'))
          jwk_y = b64url(pub_point.y().to_bytes(32, 'big'))
          jwk_d = b64url(sk_ec.privkey.secret_multiplier.to_bytes(32, 'big'))
          jwk_k = b64url(secret.encode())
          kid = str(uuid.UUID(bytes=hmac.new(secret.encode(), b'jwks_kid', hashlib.sha512).digest()[:16]))
          jwt_keys = json.dumps([{"kty":"EC","kid":kid,"use":"sig","key_ops":["sign","verify"],"alg":"ES256","ext":True,"crv":"P-256","x":jwk_x,"y":jwk_y,"d":jwk_d},{"kty":"oct","alg":"HS256","k":jwk_k,"kid":"legacy-hs256"}])
          jwt_jwks = json.dumps({"keys":[{"kty":"EC","kid":kid,"use":"sig","key_ops":["verify"],"alg":"ES256","ext":True,"crv":"P-256","x":jwk_x,"y":jwk_y},{"kty":"oct","alg":"HS256","k":jwk_k,"kid":"legacy-hs256"}]})
          anon_asymmetric = sign_es256({'role':'anon','iss':'supabase','iat':iat,'exp':exp}, sk_ec, kid)
          service_asymmetric = sign_es256({'role':'service_role','iss':'supabase','iat':iat,'exp':exp}, sk_ec, kid)
          def mk_opaque(p):
              r = b64url(hmac.new(secret.encode(),f'opaque_{p}'.encode(),hashlib.sha512).digest()[:17])[:22]
              c = b64url(hmac.new(f'supabase-self-hosted|{p}{r}'.encode(),b'checksum',hashlib.sha256).digest()[:6])[:8]
              return f'{p}{r}_{c}'
          pub_k, sec_k = mk_opaque('sb_publishable_'), mk_opaque('sb_secret_')

          with open('.env') as f: env_content = f.read()
          reps = {
            'your-super-secret-and-long-postgres-password': os.environ['POSTGRES_PASSWORD'],
            'your-super-secret-jwt-token-with-at-least-32-characters-long': os.environ['JWT_SECRET'],
            'this_password_is_insecure_and_should_be_updated': os.environ['DASHBOARD_PASSWORD'],
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE': anon_key,
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLAogICAgImlzcyI6ICJzdXBhYmFzZS1kZW1vIiwKICAgICJpYXQiOiAxNjQxNzY5MjAwLAogICAgImV4cCI6IDE3OTk1MzU2MDAKfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q': service_key,
            'UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq': skb,
            'http://localhost:8000': public_url,
            'SITE_URL=http://localhost:3000': f'SITE_URL={public_url}',
            'REALTIME_DB_ENC_KEY=supabaserealtime': f'REALTIME_DB_ENC_KEY={rek}',
            'VAULT_ENC_KEY=your-32-character-encryption-key': f'VAULT_ENC_KEY={vek}',
            'PG_META_CRYPTO_KEY=your-encryption-key-32-chars-min': f'PG_META_CRYPTO_KEY={pmk}',
            'POOLER_TENANT_ID=your-tenant-id': f'POOLER_TENANT_ID={ptid}',
            # S3_PROTOCOL_ACCESS_KEY_ID/SECRET removed — storage service removed
            'your-super-secret-and-long-logflare-key-public': lfp,
            'your-super-secret-and-long-logflare-key-private': lpv,
            'SUPABASE_PUBLISHABLE_KEY=': f'SUPABASE_PUBLISHABLE_KEY={pub_k}',
            'SUPABASE_SECRET_KEY=': f'SUPABASE_SECRET_KEY={sec_k}',
            'JWT_KEYS=': f'JWT_KEYS={jwt_keys}',
            'JWT_JWKS=': f'JWT_JWKS={jwt_jwks}',
            'ANON_KEY_ASYMMETRIC=': f'ANON_KEY_ASYMMETRIC={anon_asymmetric}',
            'SERVICE_ROLE_KEY_ASYMMETRIC=': f'SERVICE_ROLE_KEY_ASYMMETRIC={service_asymmetric}',
          }
          missing = []
          for old, new in reps.items():
              if old in env_content:
                  env_content = env_content.replace(old, new)
              else:
                  missing.append(old[:40])
          if missing:
              print(f"WARNING: {len(missing)} placeholder(s) not found:")
              for m in missing: print(f"  - {m}...")
          else:
              print(f"All {len(reps)} replacements applied")
          with open('.env','w') as f: f.write(env_content)
          print(".env configured")
          PYEOF
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}

      # ── Load cached Docker images ─────────────────────────────────────
      - name: 📦 Load Docker images from cache
        run: |
          CACHE_FILE=/tmp/docker-images.tar
          if [ -f "$CACHE_FILE" ] && [ -s "$CACHE_FILE" ]; then
            SIZE=$(du -h "$CACHE_FILE" | cut -f1)
            echo "✅ Docker image cache HIT ($SIZE) — loading..."
            docker load < "$CACHE_FILE" 2>&1 | tail -3
            echo "✅ Docker images loaded from cache"
          else
            echo "⏭️  Docker image cache MISS — images will be pulled fresh"
          fi

      # ── Start containers + restore DB + tunnel (all in parallel) ────────
      - name: ⚡ Start containers + restore DB + tunnel
        run: |
          cd ${{ env.SUPABASE_DIR }}

          # Start all containers (non-blocking)
          docker compose up -d
          echo "Containers started, waiting for healthchecks..."

          # ── Run jobs in parallel with exit-code tracking ──
          STATUS_FILE=$(mktemp)
          echo 0 > "$STATUS_FILE"

          restore_db() {
            timeout 120 docker compose wait db 2>/dev/null || { echo 1 > "$STATUS_FILE"; return; }
            echo "PostgreSQL is accepting connections..."

            # ═══ CRITICAL: Wait for init scripts to finish ═══
            # pg_isready returns success BEFORE Supabase's init scripts complete.
            # If we restore before they finish, pg_restore conflicts with them
            # and fails silently (data lost). We wait for 'supabase_functions'
            # (created by init-scripts/98-webhooks.sql) OR '_supabase' (created
            # by migrations/97-_supabase.sql). Both are created by our init
            # scripts, not the base image. After either exists, remaining
            # scripts (99-jwt, 99-roles, zz-init-data) only set GUCs/passwords
            # and won't conflict with pg_restore.
            echo "Waiting for Supabase init scripts to complete..."
            INIT_TIMEOUT=120
            INIT_ELAPSED=0
            while [ $INIT_ELAPSED -lt $INIT_TIMEOUT ]; do
              if docker compose exec -T db psql -U postgres -t -c \
                "SELECT 1 FROM information_schema.schemata WHERE schema_name IN ('_supabase','supabase_functions')" 2>/dev/null | grep -q 1; then
                echo "✅ Supabase init scripts complete"
                break
              fi
              sleep 1
              INIT_ELAPSED=$((INIT_ELAPSED + 1))
            done
            if [ $INIT_ELAPSED -ge $INIT_TIMEOUT ]; then
              echo "⚠️  Timed out waiting for init scripts — continuing anyway"
            fi

            if [ ! -f ./backup.dump ]; then
              echo "No backup file found — starting fresh database"
              return
            fi

            # Verify backup is valid before attempting restore
            BACKUP_SIZE=$(stat -c%s ./backup.dump 2>/dev/null || echo 0)
            if [ "$BACKUP_SIZE" -lt 100 ]; then
              echo "⚠️  Backup file too small (${BACKUP_SIZE}B) — skipping restore"
              return
            fi
            echo "Restoring database from backup ($(du -h ./backup.dump | cut -f1))..."

            # Copy backup into container
            if ! docker compose cp ./backup.dump db:/tmp/backup.dump; then
              echo "ERROR: Failed to copy backup into container"
              echo 1 > "$STATUS_FILE"
              return
            fi

            # Restore with explicit error capture
            # --clean --if-exists: DROP existing objects before recreating
            # --no-owner: Don't try to restore ownership (handled by init scripts)
            # --no-privileges: Don't restore ACLs (handled by init scripts)
            # --disable-triggers: Prevent trigger interference during restore
            # --exclude-schema: Skip pg_* schemas that init scripts manage
            RESTORE_LOG=$(mktemp)
            if docker compose exec -T db pg_restore -U postgres -d postgres \
              --clean --if-exists --no-owner --no-privileges --disable-triggers \
              --jobs 2 \
              /tmp/backup.dump 2>&1 | tee "$RESTORE_LOG" | tail -5; then
              echo "✅ Database fully restored from backup"
            else
              echo "⚠️  pg_restore completed with warnings (check log)"
              # Check if the restore actually failed or just had warnings
              if grep -qi "error:" "$RESTORE_LOG" 2>/dev/null; then
                echo "ERROR: pg_restore encountered errors:"
                grep -i "error:" "$RESTORE_LOG" | head -5
                echo 1 > "$STATUS_FILE"
              else
                echo "(Non-critical warnings only — data should be intact)"
              fi
            fi
            rm -f "$RESTORE_LOG"

            # ═══ Verify restore success ═══
            echo "Verifying restore..."
            # Count tables in the 'public' schema specifically — on a fresh Supabase
            # init, 'public' has 0 tables. User data lives in 'public' and custom
            # schemas, so counting public tables isolates user-created data from
            # system schemas (auth, realtime, extensions, etc.)
            PUBLIC_TABLES=$(docker compose exec -T db psql -U postgres -t -A -c \
              "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE';" 2>/dev/null || echo "0")
            echo "📊 User tables (public schema): $PUBLIC_TABLES"
            if [ "$PUBLIC_TABLES" -gt 0 ] 2>/dev/null; then
              echo "✅ Restore verified — user data present in public schema"
            else
              # Could be a fresh DB with no user tables, OR a failed restore
              SYSTEM_TABLES=$(docker compose exec -T db psql -U postgres -t -A -c \
                "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema IN ('auth','realtime','_realtime','supabase_functions','_analytics','_supabase','extensions','storage');" 2>/dev/null || echo "0")
              echo "📊 System tables (all schemas): $SYSTEM_TABLES"
              if [ "$SYSTEM_TABLES" -gt 0 ] 2>/dev/null; then
                echo "ℹ️  System schemas are present — this may be a fresh start or a restore of a DB without user tables"
              else
                echo "⚠️  No tables found anywhere — database may be empty!"
              fi
            fi
          }

          start_tunnel() {
            timeout 120 docker compose wait kong 2>/dev/null || { echo 1 > "$STATUS_FILE"; return; }
            echo "Kong is ready on port 8000!"
            if [ -n "${{ secrets.CF_TUNNEL_TOKEN }}" ]; then
              nohup cloudflared tunnel --no-autoupdate run \
                --url http://localhost:8000 \
                --token ${{ secrets.CF_TUNNEL_TOKEN }} \
                > /tmp/cloudflared.log 2>&1 &
              TUNNEL_PID=$!
              echo "TUNNEL_PID=$TUNNEL_PID" >> $GITHUB_ENV
              echo "Cloudflare Tunnel starting..."
              for i in $(seq 1 12); do
                sleep 5
                if ! kill -0 $TUNNEL_PID 2>/dev/null; then
                  echo "cloudflared process died!"
                  tail -20 /tmp/cloudflared.log
                  break
                fi
                if grep -q "Registered tunnel connection" /tmp/cloudflared.log 2>/dev/null; then
                  echo "Tunnel connected!"
                  TUNNEL_URL=$(grep -oP 'https?://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cloudflared.log 2>/dev/null | head -1)
                  if [ -n "$TUNNEL_URL" ]; then
                    echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
                  fi
                  break
                fi
              done
            fi
          }

          restore_db &
          start_tunnel &
          wait

          ERR=$(cat "$STATUS_FILE")
          rm -f "$STATUS_FILE"
          if [ "$ERR" -ne 0 ]; then
            echo "WARNING: Some services failed to start"
          fi
          echo "All services ready!"
          docker compose ps 2>/dev/null | head -15

      # ── Save Docker images to cache (for next run) ─────────────────────
      - name: 💿 Save Docker images to cache
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          cd ${{ env.SUPABASE_DIR }}
          echo "💾 Docker cache MISS — saving pulled images for next run..."
          docker save $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase|kong|postgrest|timberio') \
            -o /tmp/docker-images.tar 2>&1 | tail -3
          SIZE=$(du -h /tmp/docker-images.tar 2>/dev/null | cut -f1 || echo "unknown")
          echo "✅ Docker images saved ($SIZE) — ready for upload"

      - name: 📤 Upload Docker images to GitHub cache
        if: steps.cache-docker.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/docker-images.tar
          key: docker-images-${{ hashFiles('supabase/docker-compose.yml', 'supabase/docker-compose.logs.yml') }}

      # ── Run Supabase (keep alive with health checks) ────────────────────
      - name: ⏱️  Supabase is LIVE
        env:
          TUNNEL_DOMAIN: ${{ secrets.CF_TUNNEL_DOMAIN }}
        run: |
          cd ${{ env.SUPABASE_DIR }}

          DURATION=20400  # 5h40m — leaves ~8 min buffer for shutdown steps
          END_TIME=$(( $(date +%s) + DURATION ))
          DOMAIN="${TUNNEL_DOMAIN:-localhost:8000}"

          echo ""
          echo "+=============================================================+"
          echo "|         SUPABASE IS LIVE ON GITHUB ACTIONS                  |"
          echo "+=============================================================+"
          echo "|                                                             |"
          echo "|  Studio:  http://localhost:8000                             |"
          echo "|  Tunnel:  Connected via Cloudflare                          |"
          if [ -n "$TUNNEL_DOMAIN" ]; then
            echo "|  Domain:  https://$DOMAIN                                     |"
          fi
          echo "|                                                             |"
          echo "|  Monitor: https://github.com/${{ github.repository }}/actions  |"
          echo "|  Badge:   https://github.com/${{ github.repository }}/actions/workflows/supabase-host.yml/badge.svg |"
          echo "|                                                             |"
          echo "|  Runs until: $(date -d @$END_TIME '+%H:%M UTC')                 |"
          echo "|  Auto-restart: every 6 hours                                |"
          echo "|  Remaining: $(( DURATION / 60 )) min                                      |"
          echo "|                                                             |"
          echo "+=============================================================+"
          echo ""

          # Keep alive loop with health checks (tick every 10s)
          while [ $(date +%s) -lt $END_TIME ]; do
            if curl -s -o /dev/null http://localhost:8000 > /dev/null 2>&1; then
              REMAINING=$(( (END_TIME - $(date +%s)) / 60 ))
              echo "$(date '+%H:%M:%S') -- Healthy | ${REMAINING}m remaining"
            else
              echo "$(date '+%H:%M:%S') -- Health check failed"
              docker compose ps --no-color 2>/dev/null | head -10 || true
            fi
            # Wait 60 seconds with a heartbeat every 10s so logs stay live
            for tick in $(seq 1 6); do
              if [ $(date +%s) -ge $END_TIME ]; then break; fi
              sleep 10
              printf "."
            done
            echo ""
          done

          echo "Time's up! Starting graceful shutdown..."

      # ── Backup database ─────────────────────────────────────────────────
      # BUGFIX: Don't delete the old backup before creating a new one.
      # If the DB container goes down before backup (race on cancel),
      # the old backup was being deleted with nothing to replace it → data loss.
      - name: 💾 Backup database before shutdown
        if: always()
        run: |
          cd ${{ env.SUPABASE_DIR }}
          
          # First check if the database container is actually running
          if docker compose exec -T db pg_isready -U postgres > /dev/null 2>&1; then
            echo "Creating database backup..."
            # Create new backup in temp file so old one survives if this fails
            docker compose exec -T db pg_dump -U postgres -F c -f /tmp/backup.dump.new postgres && \
            docker compose cp db:/tmp/backup.dump.new ./backup.dump.new && \
            mv ./backup.dump.new ./backup.dump
            if [ -f ./backup.dump ] && [ -s ./backup.dump ]; then
              SIZE=$(du -h ./backup.dump | cut -f1)
              echo "Database backed up ($SIZE)"
            else
              echo "pg_dump failed -- no backup created"
            fi
          else
            if [ -f ./backup.dump ]; then
              echo "Database not running -- preserving previous backup"
            else
              echo "Database container not running -- no prior backup to preserve"
            fi
          fi

      # ── Stop services ───────────────────────────────────────────────────
      - name: 🛑 Stop Supabase services
        if: always()
        run: |
          cd ${{ env.SUPABASE_DIR }}
          docker compose down 2>/dev/null || true
          echo "All services stopped"

      # ── Save database to cache ──────────────────────────────────────────
      # Uses a unique key per run (run_id) so cache is always updated
      - name: 💿 Save database to GitHub Actions cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.BACKUP_FILE }}
          key: supabase-db-${{ github.run_id }}

      # ── Summary ─────────────────────────────────────────────────────────
      - name: 📋 Log session summary
        if: always()
        env:
          TUNNEL_DOMAIN: ${{ secrets.CF_TUNNEL_DOMAIN }}
        run: |
          DOMAIN="${TUNNEL_DOMAIN:-localhost:8000}"
          echo ""
          echo "+=============================================================+"
          echo "|  SESSION COMPLETE                                           |"
          echo "+=============================================================+"
          if [ -f ${{ env.BACKUP_FILE }} ]; then
            SIZE=$(du -h ${{ env.BACKUP_FILE }} | cut -f1)
            echo "|  Database backed up ($SIZE)                                |"
          fi
          echo "|  Next run in ~6 hours (scheduled)                          |"
          if [ -n "$TUNNEL_DOMAIN" ]; then
            echo "|  https://$DOMAIN                                              |"
            echo "|  Badge: https://github.com/${{ github.repository }}/actions/workflows/supabase-host.yml/badge.svg |"
          fi
          echo "|  Monitor: https://github.com/${{ github.repository }}/actions    |"
          echo "+=============================================================+"
          echo ""
