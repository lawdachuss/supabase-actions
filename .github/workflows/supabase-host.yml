# =============================================================================
# 🚀 Full Supabase Self-Hosted on GitHub Actions
# =============================================================================
# What this does:
# 1. Starts ALL Supabase services (full stack with Storage, Realtime, etc.)
# 2. Restores your database from GitHub Actions cache (so data persists)
# 3. Exposes everything via Cloudflare Tunnel
# 4. Runs for ~5h45m per session (maximizing the full 6-hour GitHub Actions limit)
# 5. Scheduled every 6 hours — 20 min gap between runs for clean handoff
#
# Required GitHub Secrets:
#   CF_TUNNEL_TOKEN     - Cloudflare Tunnel token (from cloudflared tunnel token generate)
#   CF_TUNNEL_DOMAIN    - Your domain for public access (e.g. supabase.chuglii.in)
#   POSTGRES_PASSWORD   - Your secure PostgreSQL password
#   JWT_SECRET          - JWT signing secret (32+ chars)
#   DASHBOARD_PASSWORD  - Supabase Studio admin password
# =============================================================================

name: 🚀 Full Supabase Self-Hosted

on:
  workflow_dispatch:                     # Manual trigger - click "Run workflow" in GitHub UI
  schedule:
    - cron: '0 */6 * * *'               # Every 6 hours — 15min gap between runs
  push:
    branches: [ master ]                 # Also runs on push for testing

concurrency:
  group: supabase-host
  cancel-in-progress: true               # Cancel old run when new one starts (clean handoff)

env:
  SUPABASE_DIR: ./supabase
  BACKUP_FILE: ./supabase/backup.dump
  COMPOSE_FILE: docker-compose.yml:docker-compose.logs.yml
  DOCKER_SOCKET_LOCATION: /var/run/docker.sock

jobs:
  supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 355                  # 5h55m — 5 min buffer under 360 min hard limit

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # ── Docker image cache ─────────────────────────────────────────────
      - name: 🐳 Restore Docker image cache
        id: cache-docker
        uses: actions/cache/restore@v4
        with:
          path: /tmp/docker-images.tar
          key: docker-images-${{ hashFiles('supabase/docker-compose.yml', 'supabase/docker-compose.logs.yml') }}

      # ── Parallel setup: cloudflared + pip + dirs + .env ─────────────────
      # NOTE: No YAML modification here — that would change hashFiles() cache key,
      # causing Docker image cache to miss every run (cache key mismatch bug).
      - name: ⚡ Parallel setup (cloudflared, pip, dirs, .env)
        run: |
          # ── Run independent tasks in parallel ──
          (
            curl -sL --retry 3 https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
              -o /usr/local/bin/cloudflared &&
            chmod +x /usr/local/bin/cloudflared &&
            cloudflared version
          ) &
          pip install 'pyyaml==6.0.2' 'PyJWT==2.10.1' -q &
          mkdir -p ${{ env.SUPABASE_DIR }}/volumes/{db/data,functions,pooler,snippets,api,storage,logs} &
          wait
          
          # ── Configure .env ──
          cd ${{ env.SUPABASE_DIR }}
          cp .env.example .env
          if [ -n "${{ secrets.CF_TUNNEL_DOMAIN }}" ]; then
            export PUBLIC_URL="https://${{ secrets.CF_TUNNEL_DOMAIN }}"
          else
            export PUBLIC_URL="http://localhost:8000"
          fi
          python3 << 'PYEOF'
          import os, jwt, hmac, hashlib, base64
          secret = os.environ['JWT_SECRET']
          public_url = os.environ['PUBLIC_URL']

          # ── Deterministic key derivation from JWT_SECRET ──
          # All keys are derived via HMAC-SHA512 so they NEVER change between runs.
          # SHA512 gives 64 bytes (88 base64 chars) — enough for SECRET_KEY_BASE's 64-char min.
          # No new secrets needed — just the existing JWT_SECRET.

          def derive_hex(name, num_bytes):
              return hmac.new(secret.encode(), name.encode(), hashlib.sha512).hexdigest()[:num_bytes * 2]

          def derive_b64(name, length):
              return base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), name.encode(), hashlib.sha512).digest()
              ).decode()[:length]

          # Fixed timestamp → same anon/service JWTs every run (old client keys still work)
          iat = 1700000000  # Nov 2023 (fixed, not current time)
          exp = iat + 315360000  # +10 years
          anon_key = jwt.encode({'role': 'anon', 'iss': 'supabase', 'iat': iat, 'exp': exp}, secret, algorithm='HS256')
          service_key = jwt.encode({'role': 'service_role', 'iss': 'supabase', 'iat': iat, 'exp': exp}, secret, algorithm='HS256')

          skb = derive_b64('secret_key_base', 64)
          rek = derive_hex('realtime_enc_key', 8)
          vek = derive_hex('vault_enc_key', 16)
          pmk = derive_b64('pg_meta_crypto_key', 32)
          ptid = derive_hex('pooler_tenant_id', 8)
          sak = derive_hex('s3_access_key_id', 16)
          ssk = derive_hex('s3_access_key_secret', 32)
          lfp = derive_b64('logflare_public', 32)
          lpv = derive_b64('logflare_private', 32)

          with open('.env', 'r') as f:
              env_content = f.read()
          replacements = {
              'your-super-secret-and-long-postgres-password': os.environ['POSTGRES_PASSWORD'],
              'your-super-secret-jwt-token-with-at-least-32-characters-long': os.environ['JWT_SECRET'],
              'this_password_is_insecure_and_should_be_updated': os.environ['DASHBOARD_PASSWORD'],
              'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE': anon_key,
              'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLAogICAgImlzcyI6ICJzdXBhYmFzZS1kZW1vIiwKICAgICJpYXQiOiAxNjQxNzY5MjAwLAogICAgImV4cCI6IDE3OTk1MzU2MDAKfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q': service_key,
              'UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq': skb,
              'http://localhost:8000': public_url,
              'SITE_URL=http://localhost:3000': f'SITE_URL={public_url}',
              'REALTIME_DB_ENC_KEY=supabaserealtime': f'REALTIME_DB_ENC_KEY={rek}',
              'VAULT_ENC_KEY=your-32-character-encryption-key': f'VAULT_ENC_KEY={vek}',
              'PG_META_CRYPTO_KEY=your-encryption-key-32-chars-min': f'PG_META_CRYPTO_KEY={pmk}',
              'POOLER_TENANT_ID=your-tenant-id': f'POOLER_TENANT_ID={ptid}',
              'S3_PROTOCOL_ACCESS_KEY_ID=625729a08b95bf1b7ff351a663f3a23c': f'S3_PROTOCOL_ACCESS_KEY_ID={sak}',
              'S3_PROTOCOL_ACCESS_KEY_SECRET=850181e4652dd023b7a98c58ae0d2d34bd487ee0cc3254aed6eda37307425907': f'S3_PROTOCOL_ACCESS_KEY_SECRET={ssk}',
              'your-super-secret-and-long-logflare-key-public': lfp,
              'your-super-secret-and-long-logflare-key-private': lpv,
          }

          # Validate .env after replacements — catch placeholder drift early
          missing = []
          for old, new in replacements.items():
              if old in env_content:
                  env_content = env_content.replace(old, new)
              else:
                  missing.append(old[:40])
          if missing:
              print(f"WARNING: {len(missing)} placeholder(s) not found in .env.example:")
              for m in missing:
                  print(f"  - {m}...")
              print("  Upstream .env.example may have changed -- update replacements dict!")
          else:
              print("All 15 replacements applied successfully")

          with open('.env', 'w') as f:
              f.write(env_content)
          print("Configured .env with secure keys")
          PYEOF
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}

      # ── Validate docker-compose configs ────────────────────────────────
      - name: ✅ Validate docker-compose configs
        run: |
          cd ${{ env.SUPABASE_DIR }}
          docker compose config > /dev/null
          echo "All compose files validate successfully!"

      # ── Restore database from cache ─────────────────────────────────────
      # Uses versioned keys: restore from the most recent cache entry
      - name: 💾 Restore database from cache
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.BACKUP_FILE }}
          key: supabase-db-${{ github.run_id }}
          restore-keys: |
            supabase-db-
          fail-on-cache-miss: false

      # ── Start Supabase stack (load cached images or pull fresh) ────────
      - name: 🏁 Load/pull images & start services
        run: |
          cd ${{ env.SUPABASE_DIR }}
          
          if [ -f /tmp/docker-images.tar ]; then
            echo "Loading Docker images from cache..."
            docker load < /tmp/docker-images.tar 2>&1 | tail -3
          else
            echo "No cache found -- pulling images (first run or version change)..."
            docker compose pull 2>&1 | tail -3
            echo "Saving images to cache for next run..."
            docker save $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase|kong|postgrest|timberio|darthsim') \
              -o /tmp/docker-images.tar 2>&1 | tail -3
          fi
          
          echo "Starting services..."
          docker compose up -d
          echo "Waiting for services..."
          # Wait for PostgreSQL (reduced to 10 retries - starts faster than Kong)
          for i in $(seq 1 10); do
            if docker compose exec -T db pg_isready -U postgres > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "  Waiting PG... ($i/10)"
            sleep 5
          done
          # Wait for Kong (reduced to 15 retries - enough for ~75s)
          echo "Waiting for Kong on port 8000..."
          for i in $(seq 1 15); do
            if curl -s -o /dev/null http://localhost:8000 > /dev/null 2>&1; then
              echo "Kong is ready!"
              break
            fi
            echo "  Waiting Kong... ($i/15)"
            sleep 5
          done
          echo ""
          docker compose ps

      # ── Save Docker image cache for next run (if newly pulled) ─────────
      - name: 💿 Save Docker image cache
        if: steps.cache-docker.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/docker-images.tar
          key: docker-images-${{ hashFiles('supabase/docker-compose.yml', 'supabase/docker-compose.logs.yml') }}

      # ── Restore data from backup (if cached) ────────────────────────────
      - name: 🔄 Restore database from cached backup
        if: steps.cache-db.outputs.cache-hit == 'true'
        run: |
          cd ${{ env.SUPABASE_DIR }}
          echo "Backup found! Restoring..."
          docker compose cp ./backup.dump db:/tmp/backup.dump
          docker compose exec -T db pg_restore -U postgres -d postgres \
            --clean --if-exists --no-owner --no-privileges /tmp/backup.dump || \
            echo "Partial restore (expected on fresh schema migrations)"
          echo "Database restored from cache"

      # ── Start Cloudflare Tunnel ────────────────────────────────────────
      - name: 🌐 Start Cloudflare Tunnel
        id: tunnel
        env:
          TUNNEL_DOMAIN: ${{ secrets.CF_TUNNEL_DOMAIN }}
        run: |
          # Start tunnel in background with token
          nohup cloudflared tunnel --no-autoupdate run \
            --url http://localhost:8000 \
            --token ${{ secrets.CF_TUNNEL_TOKEN }} \
            > /tmp/cloudflared.log 2>&1 &
          TUNNEL_PID=$!
          echo "TUNNEL_PID=$TUNNEL_PID" >> $GITHUB_ENV

          echo "Waiting for tunnel to establish (up to 60s)..."
          for i in $(seq 1 12); do
            sleep 5
            if ! kill -0 $TUNNEL_PID 2>/dev/null; then
              echo "cloudflared process died! Check /tmp/cloudflared.log:"
              tail -20 /tmp/cloudflared.log
              exit 1
            fi
            if grep -q "Registered tunnel connection" /tmp/cloudflared.log 2>/dev/null; then
              echo "Tunnel connected successfully!"
              break
            fi
            echo "  Still waiting... ($i/12)"
          done

          # Grab the tunnel URL from logs
          TUNNEL_URL=$(grep -oP 'https?://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cloudflared.log 2>/dev/null | head -1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
            echo "Quick Tunnel URL: $TUNNEL_URL"
          fi

          echo "--- cloudflared recent logs ---"
          tail -10 /tmp/cloudflared.log
          echo "------------------------------"

          if [ -n "$TUNNEL_DOMAIN" ]; then
            echo "Tunnel active at: https://$TUNNEL_DOMAIN"
          fi

      # ── Run Supabase (keep alive with health checks) ────────────────────
      - name: ⏱️  Supabase is LIVE
        env:
          TUNNEL_DOMAIN: ${{ secrets.CF_TUNNEL_DOMAIN }}
        run: |
          cd ${{ env.SUPABASE_DIR }}

          DURATION=20400  # 5h40m — leaves ~8 min buffer for shutdown steps
          END_TIME=$(( $(date +%s) + DURATION ))
          DOMAIN="${TUNNEL_DOMAIN:-localhost:8000}"

          echo ""
          echo "+=============================================================+"
          echo "|         SUPABASE IS LIVE ON GITHUB ACTIONS                  |"
          echo "+=============================================================+"
          echo "|                                                             |"
          echo "|  Studio:  http://localhost:8000                             |"
          echo "|  Tunnel:  Connected via Cloudflare                          |"
          if [ -n "$TUNNEL_DOMAIN" ]; then
            echo "|  Domain:  https://$DOMAIN                                     |"
          fi
          echo "|                                                             |"
          echo "|  Monitor: https://github.com/${{ github.repository }}/actions  |"
          echo "|  Badge:   https://github.com/${{ github.repository }}/actions/workflows/supabase-host.yml/badge.svg |"
          echo "|                                                             |"
          echo "|  Runs until: $(date -d @$END_TIME '+%H:%M UTC')                 |"
          echo "|  Auto-restart: every 6 hours                                |"
          echo "|  Remaining: $(( DURATION / 60 )) min                                      |"
          echo "|                                                             |"
          echo "+=============================================================+"
          echo ""

          # Keep alive loop with health checks (tick every 10s)
          while [ $(date +%s) -lt $END_TIME ]; do
            if curl -s -o /dev/null http://localhost:8000 > /dev/null 2>&1; then
              REMAINING=$(( (END_TIME - $(date +%s)) / 60 ))
              echo "$(date '+%H:%M:%S') -- Healthy | ${REMAINING}m remaining"
            else
              echo "$(date '+%H:%M:%S') -- Health check failed"
              docker compose ps --no-color 2>/dev/null | head -10 || true
            fi
            # Wait 60 seconds with a heartbeat every 10s so logs stay live
            for tick in $(seq 1 6); do
              if [ $(date +%s) -ge $END_TIME ]; then break; fi
              sleep 10
              printf "."
            done
            echo ""
          done

          echo "Time's up! Starting graceful shutdown..."

      # ── Backup database ─────────────────────────────────────────────────
      - name: 💾 Backup database before shutdown
        if: always()
        run: |
          cd ${{ env.SUPABASE_DIR }}
          # Remove stale backup from previous run to avoid false success
          rm -f ./backup.dump
          
          # First check if the database container is actually running
          if docker compose exec -T db pg_isready -U postgres > /dev/null 2>&1; then
            echo "Creating database backup..."
            docker compose exec -T db pg_dump -U postgres -F c -f /tmp/backup.dump postgres && \
            docker compose cp db:/tmp/backup.dump ./backup.dump
            if [ -f ./backup.dump ] && [ -s ./backup.dump ]; then
              SIZE=$(du -h ./backup.dump | cut -f1)
              echo "Database backed up ($SIZE)"
            else
              echo "pg_dump failed -- no backup created"
            fi
          else
            echo "Database container not running -- skipping backup"
          fi

      # ── Stop services ───────────────────────────────────────────────────
      - name: 🛑 Stop Supabase services
        if: always()
        run: |
          cd ${{ env.SUPABASE_DIR }}
          docker compose down 2>/dev/null || true
          echo "All services stopped"

      # ── Save database to cache ──────────────────────────────────────────
      # Uses a unique key per run (run_id) so cache is always updated
      - name: 💿 Save database to GitHub Actions cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.BACKUP_FILE }}
          key: supabase-db-${{ github.run_id }}

      # ── Summary ─────────────────────────────────────────────────────────
      - name: 📋 Log session summary
        if: always()
        env:
          TUNNEL_DOMAIN: ${{ secrets.CF_TUNNEL_DOMAIN }}
        run: |
          DOMAIN="${TUNNEL_DOMAIN:-localhost:8000}"
          echo ""
          echo "+=============================================================+"
          echo "|  SESSION COMPLETE                                           |"
          echo "+=============================================================+"
          if [ -f ${{ env.BACKUP_FILE }} ]; then
            SIZE=$(du -h ${{ env.BACKUP_FILE }} | cut -f1)
            echo "|  Database backed up ($SIZE)                                |"
          fi
          echo "|  Next run in ~6 hours (scheduled)                          |"
          if [ -n "$TUNNEL_DOMAIN" ]; then
            echo "|  https://$DOMAIN                                              |"
            echo "|  Badge: https://github.com/${{ github.repository }}/actions/workflows/supabase-host.yml/badge.svg |"
          fi
          echo "|  Monitor: https://github.com/${{ github.repository }}/actions    |"
          echo "+=============================================================+"
          echo ""
