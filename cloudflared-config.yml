# Cloudflare Tunnel configuration for Supabase self-hosted
# Routes supabase.chuglii.in -> localhost:8000
tunnel: 3ebf3199-6e31-4918-861a-9f853b730c36
credentials-file: /tmp/supabase-tunnel-creds.json

ingress:
  # Main Supabase Studio / API access
  - hostname: supabase.chuglii.in
    service: http://localhost:8000
  # Catch-all: return 404 for unknown hostnames
  - service: http_status:404
