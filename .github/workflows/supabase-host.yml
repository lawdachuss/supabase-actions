# =============================================================================
# 🚀 Full Supabase Self-Hosted on GitHub Actions
# =============================================================================
# What this does:
# 1. Starts ALL Supabase services (full stack with Storage, Realtime, etc.)
# 2. Restores your database from GitHub Actions cache (so data persists)
# 3. Exposes everything via Cloudflare Tunnel
# 4. Runs for ~5h45m per session (maximizing the full 6-hour GitHub Actions limit)
# 5. Scheduled every 6 hours — 15 min gap between runs for clean handoff
#
# Required GitHub Secrets:
#   CF_TUNNEL_TOKEN     - Cloudflare Tunnel token (from cloudflared tunnel token generate)
#   CF_TUNNEL_DOMAIN    - Your domain for public access (e.g. supabase.chuglii.in)
#   POSTGRES_PASSWORD   - Your secure PostgreSQL password
#   JWT_SECRET          - JWT signing secret (32+ chars)
#   DASHBOARD_PASSWORD  - Supabase Studio admin password
# =============================================================================

name: 🚀 Full Supabase Self-Hosted

on:
  workflow_dispatch:                     # Manual trigger - click "Run workflow" in GitHub UI
    inputs:
      migrate_from_cloud:
        description: 'Migrate ALL data from Supabase Cloud project to this self-hosted instance'
        type: boolean
        default: false
  schedule:
    - cron: '0 */6 * * *'               # Every 6 hours — 15min gap between runs
  push:
    branches: [ master ]                 # Also runs on push for testing

concurrency:
  group: supabase-host
  cancel-in-progress: true               # Cancel old run when new one starts (clean handoff)

env:
  SUPABASE_DIR: ./supabase
  BACKUP_FILE: ./supabase/backup.dump
  COMPOSE_FILE: docker-compose.yml:docker-compose.logs.yml
  DOCKER_SOCKET_LOCATION: /var/run/docker.sock

jobs:
  supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 355                  # 5h55m — 5 min buffer under 360 min hard limit

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # ── Install cloudflared ────────────────────────────────────────────
      - name: 🔧 Install cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared version

      # ── Speed up Docker health checks (keep ALL services) ──────────────
      - name: ⚡ Optimize health check delays (full stack enabled)
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import yaml
          
          filepath = '${{ env.SUPABASE_DIR }}/docker-compose.yml'
          
          with open(filepath, 'r') as f:
              data = yaml.safe_load(f)
          
          # The docker-compose.yml and volumes are committed directly in the repo
          # (no need to clone supabase repo - saves ~20s per run)
          
          # Speed up Studio health check (reduce startup delay)
          if data and 'services' in data and 'studio' in data['services']:
              studio = data['services']['studio']
              if isinstance(studio, dict) and 'healthcheck' in studio:
                  hc = studio['healthcheck']
                  if hc.get('start_period') == '20s':
                      hc['start_period'] = '5s'
                  if hc.get('interval') == '5s':
                      hc['interval'] = '2s'
          
          with open(filepath, 'w') as f:
              yaml.dump(data, f, default_flow_style=False, sort_keys=False)
          
          print("✅ Full stack with Storage enabled, health checks optimized!")
          PYEOF

      # ── Generate .env with secrets ──────────────────────────────────────
      - name: 🔐 Configure .env with secrets
        run: |
          cd ${{ env.SUPABASE_DIR }}
          cp .env.example .env

          # Use provided domain or fall back to localhost
          if [ -n "${{ secrets.CF_TUNNEL_DOMAIN }}" ]; then
            export PUBLIC_URL="https://${{ secrets.CF_TUNNEL_DOMAIN }}"
          else
            export PUBLIC_URL="http://localhost:8000"
          fi

          # Generate secure keys using Python
          pip install PyJWT -q

          python3 << 'PYEOF'
          import os, jwt, time, secrets
          
          secret = os.environ['JWT_SECRET']
          public_url = os.environ['PUBLIC_URL']
          iat = int(time.time())
          exp = iat + 315360000  # 10 years
          
          # Generate ANON key
          anon_key = jwt.encode(
              {'role': 'anon', 'iss': 'supabase', 'iat': iat, 'exp': exp},
              secret, algorithm='HS256'
          )
          
          # Generate SERVICE_ROLE key
          service_key = jwt.encode(
              {'role': 'service_role', 'iss': 'supabase', 'iat': iat, 'exp': exp},
              secret, algorithm='HS256'
          )
          
          # Generate all required crypto keys
          secret_key_base = secrets.token_urlsafe(64)[:64]
          realtime_enc_key = secrets.token_hex(8)
          vault_enc_key = secrets.token_hex(16)
          pg_meta_key = secrets.token_urlsafe(24)
          pooler_tenant_id = secrets.token_hex(8)
          s3_access_key = secrets.token_hex(16)
          s3_secret_key = secrets.token_hex(32)
          logflare_public = secrets.token_urlsafe(32)
          logflare_private = secrets.token_urlsafe(32)
          
          # Read .env, replace values
          with open('.env', 'r') as f:
              env_content = f.read()
          
          replacements = {
              'your-super-secret-and-long-postgres-password': os.environ['POSTGRES_PASSWORD'],
              'your-super-secret-jwt-token-with-at-least-32-characters-long': os.environ['JWT_SECRET'],
              'this_password_is_insecure_and_should_be_updated': os.environ['DASHBOARD_PASSWORD'],
              'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE': anon_key,
              'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLAogICAgImlzcyI6ICJzdXBhYmFzZS1kZW1vIiwKICAgICJpYXQiOiAxNjQxNzY5MjAwLAogICAgImV4cCI6IDE3OTk1MzU2MDAKfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q': service_key,
              'UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq': secret_key_base,
              'http://localhost:8000': public_url,
              'SITE_URL=http://localhost:3000': f'SITE_URL={public_url}',
              'REALTIME_DB_ENC_KEY=supabaserealtime': f'REALTIME_DB_ENC_KEY={realtime_enc_key}',
              'VAULT_ENC_KEY=your-32-character-encryption-key': f'VAULT_ENC_KEY={vault_enc_key}',
              'PG_META_CRYPTO_KEY=your-encryption-key-32-chars-min': f'PG_META_CRYPTO_KEY={pg_meta_key}',
              'POOLER_TENANT_ID=your-tenant-id': f'POOLER_TENANT_ID={pooler_tenant_id}',
              'S3_PROTOCOL_ACCESS_KEY_ID=625729a08b95bf1b7ff351a663f3a23c': f'S3_PROTOCOL_ACCESS_KEY_ID={s3_access_key}',
              'S3_PROTOCOL_ACCESS_KEY_SECRET=850181e4652dd023b7a98c58ae0d2d34bd487ee0cc3254aed6eda37307425907': f'S3_PROTOCOL_ACCESS_KEY_SECRET={s3_secret_key}',
              'your-super-secret-and-long-logflare-key-public': logflare_public,
              'your-super-secret-and-long-logflare-key-private': logflare_private,
          }
          
          for old, new in replacements.items():
              env_content = env_content.replace(old, new)
          
          with open('.env', 'w') as f:
              f.write(env_content)
          
          print("✅ .env configured with secure keys")
          PYEOF
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}

      # ── Validate docker-compose configs ────────────────────────────────
      - name: ✅ Validate docker-compose configs
        run: |
          cd ${{ env.SUPABASE_DIR }}
          docker compose config > /dev/null
          echo "✅ All compose files validate successfully!"

      # ── Create required volume directories ─────────────────────────────
      - name: 📁 Create volume directories
        run: |
          mkdir -p ${{ env.SUPABASE_DIR }}/volumes/db/data
          mkdir -p ${{ env.SUPABASE_DIR }}/volumes/functions
          mkdir -p ${{ env.SUPABASE_DIR }}/volumes/pooler
          mkdir -p ${{ env.SUPABASE_DIR }}/volumes/snippets
          mkdir -p ${{ env.SUPABASE_DIR }}/volumes/api
          mkdir -p ${{ env.SUPABASE_DIR }}/volumes/storage
          mkdir -p ${{ env.SUPABASE_DIR }}/volumes/logs
          echo "✅ Volume directories created (including storage + logs)"

      # ── Restore database from cache ─────────────────────────────────────
      # Uses versioned keys: restore from the most recent cache entry
      - name: 💾 Restore database from cache
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.BACKUP_FILE }}
          key: supabase-db-${{ github.run_id }}
          restore-keys: |
            supabase-db-
          fail-on-cache-miss: false

      # ── Pre-pull Docker images and start Supabase stack ─────────────────
      - name: 🏁 Pre-pull images & start Supabase services
        run: |
          cd ${{ env.SUPABASE_DIR }}
          echo "⏳ Pulling Docker images (this may take a minute on first run)..."
          docker compose pull 2>&1 | tail -5
          echo "✅ Images pulled. Starting services..."
          docker compose up -d
          echo "⏳ Waiting for services to become healthy..."
          # Wait for PostgreSQL to be ready (reduced from 30 to 15 retries)
          for i in $(seq 1 15); do
            if docker compose exec -T db pg_isready -U postgres > /dev/null 2>&1; then
              echo "✅ PostgreSQL is ready!"
              break
            fi
            echo "  Waiting... ($i/15)"
            sleep 5
          done
          # Wait for Kong to be ready on port 8000 (reduced from 30 to 20 retries)
          echo "⏳ Waiting for Kong on port 8000..."
          for i in $(seq 1 20); do
            if curl -s -o /dev/null http://localhost:8000 > /dev/null 2>&1; then
              echo "✅ Kong is ready!"
              break
            fi
            echo "  Waiting... ($i/20)"
            sleep 5
          done
          echo ""
          docker compose ps

      # ── Restore data from backup (if cached) ────────────────────────────
      - name: 🔄 Restore database from cached backup
        if: steps.cache-db.outputs.cache-hit == 'true'
        run: |
          cd ${{ env.SUPABASE_DIR }}
          echo "📦 Backup found! Restoring..."
          docker compose cp ./backup.dump db:/tmp/backup.dump
          docker compose exec -T db pg_restore -U postgres -d postgres \
            --clean --if-exists --no-owner --no-privileges /tmp/backup.dump || \
            echo "⚠️  Partial restore (expected on fresh schema migrations)"
          echo "✅ Database restored from cache"

      # ── Migrate data from Supabase Cloud ────────────────────────────────
      - name: ☁️➡️🏠 Migrate ALL data from Supabase Cloud
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.migrate_from_cloud == 'true'
        env:
          SUPABASE_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, subprocess, urllib.request, urllib.error
          import shlex
          
          REF = os.environ['SUPABASE_REF']
          KEY = os.environ['SUPABASE_KEY']
          
          def api_get(url):
              req = urllib.request.Request(url, headers={
                  "apikey": KEY, "Authorization": f"Bearer {KEY}",
                  "Accept": "application/json"
              })
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read().decode())
          
          def exec_sql(sql):
              """Run SQL on local database, capture stdout+stderr"""
              r = subprocess.run(
                  ["docker", "compose", "exec", "-T", "db", "psql",
                   "-U", "postgres", "-d", "postgres", "-c", sql],
                  capture_output=True, text=True, timeout=30
              )
              return r.stdout + r.stderr
          
          def exec_sql_stdin(sql):
              """Run multi-line SQL via stdin"""
              r = subprocess.run(
                  ["docker", "compose", "exec", "-T", "db", "psql",
                   "-U", "postgres", "-d", "postgres"],
                  input=sql, capture_output=True, text=True, timeout=120
              )
              return r.stdout + r.stderr
          
          print("📡 Fetching full schema from pg-meta API...")
          tables_meta = api_get(f"https://{REF}.supabase.co/pg-meta/default/tables")
          public_tables = [t for t in tables_meta if t['schema'] == 'public' and not t['name'].startswith('_')]
          table_names = sorted([t['name'] for t in public_tables])
          print(f"✅ Found {len(table_names)} public tables: {', '.join(table_names)}")
          
          # Build table-by-name index
          table_index = {t['name']: t for t in public_tables}
          
          # ── Step 1: Create tables ────────────────────────────────────────
          print("\n🏗️  Creating tables from pg-meta metadata...")
          created = 0
          for name in table_names:
              meta = table_index[name]
              cols = []
              pk_cols = [pk['name'] for pk in meta.get('primary_keys', [])]
              
              for col in meta.get('columns', []):
                  col_name = col['name']
                  col_type = col['type']
                  nullable = '' if col.get('is_nullable') else 'NOT NULL'
                  default = f"DEFAULT {col['default_value']}" if col.get('default_value') else ''
                  is_pk = 'PRIMARY KEY' if col_name in pk_cols else ''
                  cols.append(f'  "{col_name}" {col_type} {default} {nullable} {is_pk}'.strip())
              
              if cols:
                  pk_extra = ''
                  # If PKs are composite, add table-level constraint
                  composite_pks = [c for c in pk_cols if c not in [col['name'] for col in meta.get('columns', [])]]
                  if len(pk_cols) > 1:
                      pk_extra = f', PRIMARY KEY ({", ".join(f"\"{c}\"" for c in pk_cols)})'
                  
                  sql = f'CREATE TABLE IF NOT EXISTS public."{name}" (\n' + ',\n'.join(cols) + f'{pk_extra}\n);'
                  result = exec_sql_stdin(sql)
                  if 'ERROR' in result.upper():
                      print(f"  ⚠️  {name}: {result[:200]}")
                  else:
                      created += 1
                      print(f"  ✅ {name} (PK: {', '.join(pk_cols) if pk_cols else 'none'})")
          
          print(f"\n✅ Created {created}/{len(table_names)} tables")
          
          # ── Step 2: Migrate data ─────────────────────────────────────────
          print("\n📦 Migrating data...")
          total_rows = 0
          for name in table_names:
              print(f"\n  📤 {name}: fetching...", end=' ', flush=True)
              offset = 0
              limit = 1000
              rows_imported = 0
              
              while True:
                  url = f"https://{REF}.supabase.co/rest/v1/{name}?select=*&limit={limit}&offset={offset}"
                  try:
                      rows = api_get(url)
                  except Exception as e:
                      print(f"\n    ⚠️  Fetch error: {e}")
                      break
                  if not rows:
                      break
                  
                  # Use jsonb_populate_record for type-safe inserts
                  insert_sql = '\n'.join(
                      f"SELECT 1 FROM pg_try_advisory_xact_lock(hashtext('migrate_{name}'));"
                      f"INSERT INTO public.\"{name}\" SELECT * FROM jsonb_populate_record(NULL::public.\"{name}\", '{json.dumps(r).replace(chr(39), chr(39)+chr(39))}'::jsonb);"
                      for r in rows
                  )
                  result = exec_sql_stdin(insert_sql)
                  if 'ERROR' in result.upper():
                      # Fallback: insert row by row to isolate failures
                      for r in rows:
                          single_sql = f"INSERT INTO public.\"{name}\" SELECT * FROM jsonb_populate_record(NULL::public.\"{name}\", '{json.dumps(r).replace(chr(39), chr(39)+chr(39))}'::jsonb);"
                          r2 = exec_sql_stdin(single_sql)
                          if 'ERROR' not in r2.upper():
                              rows_imported += 1
                  else:
                      rows_imported += len(rows)
                  
                  offset += limit
                  if len(rows) < limit:
                      break
              
              total_rows += rows_imported
              print(f"✅ {rows_imported} rows imported")
          
          print(f"\n{'='*50}")
          print(f"✅ MIGRATION COMPLETE!")
          print(f"   Tables: {created}/{len(table_names)}")
          print(f"   Rows:   {total_rows}")
          print(f"{'='*50}")
          PYEOF

      # ── Start Cloudflare Tunnel ────────────────────────────────────────
      - name: 🌐 Start Cloudflare Tunnel
        id: tunnel
        env:
          TUNNEL_DOMAIN: ${{ secrets.CF_TUNNEL_DOMAIN }}
        run: |
          # Start tunnel in background with token (much simpler than credentials file)
          nohup cloudflared tunnel --no-autoupdate run \
            --url http://localhost:8000 \
            --token ${{ secrets.CF_TUNNEL_TOKEN }} \
            > /tmp/cloudflared.log 2>&1 &
          TUNNEL_PID=$!
          echo "TUNNEL_PID=$TUNNEL_PID" >> $GITHUB_ENV

          echo "⏳ Waiting for tunnel to establish (up to 30s)..."
          for i in $(seq 1 6); do
            sleep 5
            # Check if cloudflared is still running
            if ! kill -0 $TUNNEL_PID 2>/dev/null; then
              echo "❌ cloudflared process died! Check /tmp/cloudflared.log:"
              tail -20 /tmp/cloudflared.log
              exit 1
            fi
            # Check logs for connection confirmation
            if grep -q "Registered tunnel connection" /tmp/cloudflared.log 2>/dev/null; then
              echo "✅ Tunnel connected successfully!"
              break
            fi
            echo "  Still waiting... ($i/6)"
          done

          # Show recent logs for visibility
          echo "--- cloudflared recent logs ---"
          tail -10 /tmp/cloudflared.log
          echo "------------------------------"

          if [ -n "$TUNNEL_DOMAIN" ]; then
            echo "✅ Tunnel active at: https://$TUNNEL_DOMAIN"
          fi

      # ── Run Supabase (keep alive with health checks) ────────────────────
      - name: ⏱️  Supabase is LIVE
        env:
          TUNNEL_DOMAIN: ${{ secrets.CF_TUNNEL_DOMAIN }}
        run: |
          cd ${{ env.SUPABASE_DIR }}

          DURATION=20400  # 5h40m — leaves ~8 min buffer for shutdown steps
          END_TIME=$(( $(date +%s) + DURATION ))
          DOMAIN="${TUNNEL_DOMAIN:-localhost:8000}"

          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║        🚀  SUPABASE IS LIVE ON GITHUB ACTIONS          ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║                                                        ║"
          echo "║  📊 Studio:  http://localhost:8000                     ║"
          echo "║  📡 Tunnel:  Connected via Cloudflare                  ║"
          if [ -n "$TUNNEL_DOMAIN" ]; then
            echo "║  🌐 Domain:  https://$TUNNEL_DOMAIN                     ║"
          else
            echo "║  ⚠️  No domain configured — add one in Cloudflare       ║"
          fi
          echo "║                                                        ║"
          echo "║  ⏱️  Runs until: $(date -d @$END_TIME '+%H:%M UTC')  ║"
          echo "║  🔄 Auto-restart: every 6 hours                        ║"
          echo "║                                                        ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""

          # Kong is already confirmed ready — start health check loop immediately
          # Keep alive loop with health checks (tick every 10s for live log visibility)
          while [ $(date +%s) -lt $END_TIME ]; do
            if curl -s -o /dev/null http://localhost:8000 > /dev/null 2>&1; then
              REMAINING=$(( (END_TIME - $(date +%s)) / 60 ))
              echo "✅ $(date '+%H:%M:%S') — Healthy | ${REMAINING}m remaining"
            else
              echo "⚠️  $(date '+%H:%M:%S') — Health check failed"
              docker compose ps --no-color 2>/dev/null | head -10 || true
            fi
            # Wait 60 seconds with a heartbeat every 10s so logs stay live
            for tick in $(seq 1 6); do
              if [ $(date +%s) -ge $END_TIME ]; then break; fi
              sleep 10
              printf "."
            done
            echo ""  # newline after heartbeat dots
          done

          echo "⏰ Time's up! Starting graceful shutdown..."

      # ── Backup database ─────────────────────────────────────────────────
      - name: 💾 Backup database before shutdown
        if: always()
        run: |
          cd ${{ env.SUPABASE_DIR }}
          echo "📦 Creating database backup..."
          docker compose exec -T db pg_dump -U postgres -F c -f /tmp/backup.dump postgres || \
            echo "⚠️  pg_dump failed (DB may not be running)"
          docker compose cp db:/tmp/backup.dump ./backup.dump 2>/dev/null || \
            echo "⚠️  Could not copy backup file"
          if [ -f ./backup.dump ]; then
            ls -lh ./backup.dump
            echo "✅ Database backup complete!"
          fi

      # ── Stop services ───────────────────────────────────────────────────
      - name: 🛑 Stop Supabase services
        if: always()
        run: |
          cd ${{ env.SUPABASE_DIR }}
          docker compose down 2>/dev/null || true
          echo "✅ All services stopped"

      # ── Save database to cache ──────────────────────────────────────────
      # Uses a unique key per run (run_id) so cache is always updated
      - name: 💿 Save database to GitHub Actions cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.BACKUP_FILE }}
          key: supabase-db-${{ github.run_id }}

      # ── Summary ─────────────────────────────────────────────────────────
      - name: 📋 Log session summary
        if: always()
        env:
          TUNNEL_DOMAIN: ${{ secrets.CF_TUNNEL_DOMAIN }}
        run: |
          DOMAIN="${TUNNEL_DOMAIN:-localhost:8000}"
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  🚀  SESSION COMPLETE                                  ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          if [ -f ${{ env.BACKUP_FILE }} ]; then
            SIZE=$(du -h ${{ env.BACKUP_FILE }} | cut -f1)
            echo "║  ✅ Database backed up ($SIZE)                        ║"
          fi
          echo "║  🔄  Next run in ~6 hours (scheduled)                   ║"
          if [ -n "$TUNNEL_DOMAIN" ]; then
            echo "║  🌐  https://$DOMAIN                                   ║"
          fi
          echo "╚══════════════════════════════════════════════════════════╝"

